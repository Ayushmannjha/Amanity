<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff9a00"/>
      <stop offset="50%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#2fb6ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffd36b"/>
      <stop offset="100%" stop-color="#5ee0ff"/>
    </linearGradient>
  </defs>

  <!-- Simple stylized A mark inspired by provided logo -->
  <g transform="translate(20,10)">
    <path d="M100 0 L180 140 L140 160 L60 160 L20 140 Z" fill="url(#g1)"/>
    <path d="M100 0 L140 160 L60 160 Z" fill="url(#g2)" opacity="0.85"/>

    <!-- pixel pieces on top-right -->
    <rect x="155" y="6" width="8" height="8" fill="#8b6bff"/>
    <rect x="168" y="20" width="6" height="6" fill="#7dd3fc"/>
    <rect x="180" y="34" width="5" height="5" fill="#a78bfa"/>
  </g>
</svg>
